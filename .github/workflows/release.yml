name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: ./Scripts/make_release.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: cmdFlow ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## cmdFlow ${{ github.ref_name }}

            A macOS app that runs clipboard text through an AI model under a global shortcut → on-device (Apple Foundation Model), or via OpenRouter/OpenAI.

            ### Install (unsigned app)
            1. Download `cmdFlow-${{ steps.version.outputs.version }}.dmg`, open it, and drag cmdFlow to Applications.
            2. First launch: **right-click cmdFlow → Open** (Gatekeeper blocks unsigned apps).
            3. If macOS claims the app is "damaged":
               `xattr -dr com.apple.quarantine /Applications/cmdFlow.app`

            ### Requirements
            macOS 26+, Apple Silicon. Apple mode needs Apple Intelligence; cloud mode needs an API key.

            Landing: https://cmd-flow-landing.vercel.app
          files: |
            dist/cmdFlow-${{ steps.version.outputs.version }}.dmg
            dist/cmdFlow-${{ steps.version.outputs.version }}.zip
