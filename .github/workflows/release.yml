name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: ./Scripts/make_release.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: cmdFlow ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## cmdFlow ${{ github.ref_name }}

            Menu-bar app na macOS: globalny skrót → tekst ze schowka → prompt → Apple Foundation Model (on-device) → wynik w schowku.

            ### Instalacja (aplikacja niepodpisana)
            1. Pobierz `cmdFlow-${{ steps.version.outputs.version }}.dmg`, otwórz, przeciągnij cmdFlow do Aplikacji.
            2. Przy pierwszym uruchomieniu: **kliknij prawym na cmdFlow → Otwórz** (Gatekeeper blokuje niepodpisane aplikacje).
            3. Jeśli macOS twierdzi, że aplikacja jest „uszkodzona":
               `xattr -dr com.apple.quarantine /Applications/cmdFlow.app`

            ### Wymagania
            macOS 26+, Apple Silicon, włączone Apple Intelligence.
          files: |
            dist/cmdFlow-${{ steps.version.outputs.version }}.dmg
            dist/cmdFlow-${{ steps.version.outputs.version }}.zip
